<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Question</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h2 {
            color: #333;
        }
        form {
            margin-bottom: 20px;
        }
        blockquote {
            max-width: 600px;
            margin: 10px;
            padding: 15px;
            border-left: 8px solid green;
            background-color: #f8fffe;
            font-weight: bold;
        }
        label {
            display: block;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h2>Quiz Question</h2>
    <form>
        <p>What is the capital of India?</p>
        <label>
            <input type="radio" name="capital" value="New Delhi"> New Delhi
        </label>
        <label>
            <input type="radio" name="capital" value="Mumbai"> Mumbai
        </label>
    </form>
    
    <blockquote>
        New Delhi is the capital of India and an administrative district of NCT Delhi. 
        <cite>Source: Wikipedia</cite>
    </blockquote>
</body>
</html>
